<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=index.html#articles">
  <title>正在前往文章列表 - choppy</title>
  <script>
    const tag = new URLSearchParams(window.location.search).get("tag");
    window.location.replace(tag ? `index.html?tag=${encodeURIComponent(tag)}#articles` : "index.html#articles");
  </script>
</head>
<body>
  <p>文章列表已整合到首页，<a href="index.html#articles">点击前往</a>。</p>
</body>
</html>
