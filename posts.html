<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全部文章 - MyBlog</title>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="container nav-container" aria-label="主导航">
      <a class="site-title" href="index.html">MyBlog</a>
      <ul class="nav-links">
        <li><a class="nav-link" href="index.html">首页</a></li>
        <li><a class="nav-link active" href="posts.html" aria-current="page">文章</a></li>
        <li><a class="nav-link" href="about.html">关于</a></li>
      </ul>
      <button class="theme-switcher" type="button" aria-label="当前主题：浅色。切换到 Ayu 深色">
        <span class="theme-switcher-icon" aria-hidden="true">☀</span>
      </button>
    </nav>
  </header>

  <main class="container page-content posts-page">
    <header class="page-intro">
      <h1>全部文章</h1>
      <p>这里记录技术学习、项目实践与个人思考</p>
    </header>

    <section class="filter-section" aria-labelledby="filter-title">
      <h2 id="filter-title">文章分类</h2>
      <div class="filter-buttons">
        <button class="filter-button active" type="button" aria-pressed="true">全部</button>
        <button class="filter-button" type="button" aria-pressed="false">技术</button>
        <button class="filter-button" type="button" aria-pressed="false">随笔</button>
        <button class="filter-button" type="button" aria-pressed="false">项目</button>
      </div>
    </section>

    <section class="article-list" aria-label="文章列表" data-article-list>
      <p class="content-status">正在加载文章列表…</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 MyBlog</p>
    </div>
  </footer>

  <button class="back-to-top" type="button" aria-label="返回顶部" aria-hidden="true">↑</button>
  <script src="js/main.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
