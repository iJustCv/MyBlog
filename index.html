<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="记录技术学习、项目实践与生活思考的个人博客。">
  <meta name="author" content="choppy">
  <title>文章 - choppy</title>
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="wide-container nav-container" aria-label="主导航">
      <a class="site-brand" href="index.html" aria-label="choppy 首页">
        <img class="brand-avatar" src="images/choppy-avatar.png" alt="">
        <span>choppy</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
        <span class="sr-only">展开导航</span><span aria-hidden="true">☰</span>
      </button>
      <ul class="nav-links" id="site-menu">
        <li><a class="nav-link active" href="index.html" aria-current="page">首页</a></li>
        <li><a class="nav-link" href="archive.html">归档</a></li>
        <li><a class="nav-link" href="about.html">关于</a></li>
      </ul>
      <button class="theme-switcher" type="button" aria-label="切换深色模式">
        <span class="theme-switcher-icon" aria-hidden="true">☾</span>
      </button>
    </nav>
  </header>

  <main class="wide-container home-articles" id="articles">
    <div class="main-column">
      <section class="home-feed" aria-labelledby="articles-title">
        <div class="section-heading">
          <div><h1 id="articles-title">文章</h1></div>
        </div>
        <div class="article-search" role="search">
          <span class="search-icon" aria-hidden="true"></span>
          <label class="sr-only" for="article-search-input">搜索文章</label>
          <input id="article-search-input" type="search" placeholder="输入关键词" autocomplete="off" data-article-search>
          <button class="search-clear" type="button" aria-label="清空搜索" title="清空搜索" data-search-clear hidden>×</button>
        </div>
        <p class="search-result" aria-live="polite" data-search-result>全部文章</p>
        <div class="article-list" aria-label="文章列表" data-article-list><p class="content-status">正在加载文章列表…</p></div>
      </section>
    </div>
  </main>

  <footer class="site-footer"><div class="wide-container footer-inner"><p>© <span data-current-year>2026</span> choppy</p><p>保持好奇，持续记录 <span aria-hidden="true">✦</span></p></div></footer>
  <button class="back-to-top" type="button" aria-label="返回顶部" aria-hidden="true"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 19V5M6.5 10.5 12 5l5.5 5.5"/></svg></button>
  <script src="js/main.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
